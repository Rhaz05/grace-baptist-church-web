<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preaching - Grace Baptist Church</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="public/css/preaching.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/91d5bebb50.js" crossorigin="anonymous"></script>
    <base href="https://rhaz05.github.io/grace-baptist-church-web/">

</head>

<body>
    <video autoplay muted loop id="video-background">
        <source src="public/videos/sample_video_1.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div id="header">
        <div style="padding: 20px; text-align: center; background: #f8f9fa;">
            Loading header...
        </div>
    </div>

    <main class="main-container">

        <div class="container" style=" padding-bottom: 50px;">
            <section class="main-title-section">
                <div class="container">
                    <h1 class="text-uppercase fw-bold">Preaching</h1>
                    <p class="lead">Egestas elit dui scelerisque ut eu purus aliquam vitae habitasse.</p>
                </div>
            </section>
        </div>

        <section class="quick-info-section">
            <div class="container">
                <div class="card p-5">
                    <h4 class="fw-bold mb-4">Title</h4>

                    <div class="row g-3">

                        <div class="row">
                            <div class="col-lg-12">
                                <label for="searchSermon" class="form-label text-muted d-block text-start">Search for
                                    Sermon</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="searchSermon"
                                        placeholder="Search for Sermon">
                                    <span class="input-group-text border-start-0" id="searchIcon">
                                        <i class="fas fa-search"></i>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <label for="bookSelect" class="form-label text-muted d-block text-start">Book of the
                                Bible</label>
                            <select class="form-select" id="bookSelect">
                                <option selected value="-Any-">-Any-</option>
                            </select>
                        </div>

                        <div class="col-lg-6">
                            <label for="dateSelect" class="form-label text-muted d-block text-start">Date</label>
                            <input type="date" class="form-control" id="dateSelect" placeholder="Select Date">
                            <small class="form-text text-muted text-start d-block mt-1">E.g. dd/mm/yyyy</small>
                        </div>

                        <div class="col-12 col-md-6 col-lg-2 ms-lg-auto d-flex align-items-end justify-content-end">
                            <button class="btn btn-outline-red btn-audio text-uppercase"
                                style="width: 150px; height: 38px;">Search</button>
                        </div>

                    </div>
                </div>
            </div>

            <div class="container mt-5">
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                </div>
            </div>

            <nav aria-label="Sermon page navigation" class="mt-3">
                <ul class="pagination justify-content-center">
                </ul>
            </nav>
        </section>

    </main>

    <div id="footer">
        <div style="padding: 20px; text-align: center; background: #6c757d; color: white;">
            Loading footer...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="public/js/script.js"></script>
    <script src="public/js/preaching.js"></script>

</body>



</html>
