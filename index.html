<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grace Baptist Church</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="public/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/91d5bebb50.js" crossorigin="anonymous"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <base href="https://rhaz05.github.io/grace-baptist-church-web/">

</head>

<body>
    <video autoplay muted loop id="video-background">
        <source src="public/videos/sample_video_1.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Header Placeholder -->
    <div id="header">
        <div style="padding: 20px; text-align: center; background: #f8f9fa;">
            Loading header...
        </div>
    </div>

    <main class="main-container">
        <!-- Hero Section - Keeping your original structure -->
        <div class="container" style="padding-top: 535px; padding-bottom: 150px;">
            <div style="padding-left: 15px;">
                <div style="display: flex; align-items: center;">
                    <div class="hero-accent"></div>
                    <h1 class="text-holder">Welcome to Grace Baptist Church</h1>
                </div>
            </div>
        </div>

        <!-- Quick Info Section -->
        <section class="quick-info-section">
            <div class="container">
                <div class="d-flex justify-content-center align-items-center mb-5">
                    <div class="divider-line"></div>
                    <h2>Quick Info</h2>
                    <div class="divider-line"></div>
                </div>

                <div class="row text-center">
                    <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
                        <i class="fas fa-calendar-alt fa-2x mb-3"></i>
                        <p class="text-muted">Sunday Worship: 10:00 AM</p>
                    </div>

                    <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
                        <i class="fas fa-lock fa-2x mb-3"></i>
                        <p class="text-muted">Safe and Welcoming Environment</p>
                    </div>

                    <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
                        <i class="fas fa-heartbeat fa-2x mb-3"></i>
                        <p class="text-muted">Caring Community Support</p>
                    </div>

                    <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
                        <i class="fas fa-bus fa-2x mb-3"></i>
                        <p class="text-muted">Transportation Available</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Sermon Section -->
        <section class="sermon-section">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-6 mb-4">
                        <p class="text-uppercase text-muted mb-1">Latest Sermon</p>
                        <h2 class="latest-sermon-title mb-4">The Power of Faith</h2>

                        <a href="#" class="btn btn-red mb-3 d-block w-75">
                            <i class="fas fa-plus"></i> Watch Now
                        </a>

                        <a href="#" class="btn btn-outline-red d-block w-75">
                            <i class="fas fa-plus"></i> View all Sermons
                        </a>
                    </div>

                    <div class="col-lg-6 mb-4">
                        <div class="video-placeholder">
                            <i class="fas fa-play-circle"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Events Section -->
        <section class="events-section">
            <div class="container text-center">
                <h2 class="latest-sermon-title mb-5">Events</h2>

                <div class="row justify-content-center mb-5">
                    <div class="col-lg-5 col-md-6 mb-4">
                        <div class="event-card">
                            <div class="event-icon">
                                <span>&times;</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-5 col-md-6 mb-4">
                        <div class="event-card">
                            <div class="event-icon">
                                <span>&times;</span>
                            </div>
                        </div>
                    </div>
                </div>

                <a href="#" class="btn btn-red btn-lg">
                    <i class="fas fa-plus mx-3 my-2"></i> VIEW UPCOMING EVENTS
                </a>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer">
        <div style="padding: 20px; text-align: center; background: #6c757d; color: white;">
            Loading footer...
        </div>
    </div>

    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="public/js/script.js"></script>
</body>

</html>
